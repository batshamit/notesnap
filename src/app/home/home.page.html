<ion-header>
  <ion-toolbar color="primary">
    <ion-title>📝 NoteSnap</ion-title>
    <ion-badge slot="end" color="light">{{ notes.length }}</ion-badge>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar [(ngModel)]="searchTerm"
      placeholder="Search notes..." animated="true">
    </ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  
  <ion-segment [(ngModel)]="selectedCategory" value="All">
    <ion-segment-button value="All">
      <ion-label>All</ion-label>
    </ion-segment-button>
    <ion-segment-button value="Personal">
      <ion-label>Personal</ion-label>
    </ion-segment-button>
    <ion-segment-button value="Study">
      <ion-label>Study</ion-label>
    </ion-segment-button>
    <ion-segment-button value="Work">
      <ion-label>Work</ion-label>
    </ion-segment-button>
  </ion-segment>

  <ion-list>
    @for (note of filteredNotes; track note.id) {
      <ion-item>
        <ion-label>
          <h2>{{ note.title }}</h2>
          <p>{{ note.content }}</p>
          
          <ion-chip [color]="note.category === 'Work' ? 'danger' :
            note.category === 'Study' ? 'tertiary' : 'secondary'"
            outline="true">
            {{ note.category }}
          </ion-chip>
          
        </ion-label>
        <ion-badge slot="end" color="medium">
          {{ note.createdAt | date:'shortDate' }}
        </ion-badge>
        <ion-button slot="end" fill="clear" color="danger"
          (click)="deleteNote(note.id)">
          <ion-icon name="trash"></ion-icon>
        </ion-button>
      </ion-item>
    }
  </ion-list>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="openAddModal()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
